# Per-PR preview cleanup.
#
# Deletes the PR's dedicated D1 database (`<project>-db-pr-<N>`, provisioned
# by preview.yml via scripts/ci/setup-preview-db.ts) when the PR closes.
# Same opt-in gate as preview.yml: the repo variable CLOUDFLARE_ACCOUNT_ID
# and secret CLOUDFLARE_API_TOKEN must be set, otherwise the job is skipped.
#
# The shared preview R2 bucket is intentionally NOT touched — it is shared
# across all PR previews and outlives any single PR.
name: Preview Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  cleanup-preview:
    name: Delete per-PR D1
    runs-on: ubuntu-latest
    if: ${{ vars.CLOUDFLARE_ACCOUNT_ID != '' }}
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Delete per-PR D1
        # Must not fail the job if the DB never existed (PR predates this
        # workflow, or previews were enabled after the PR opened).
        run: |
          PROJECT_NAME=$(bun -e 'const fs = require("node:fs"); const c = fs.readFileSync("wrangler.jsonc", "utf-8").replace(/^\s*\/\/.*$/gm, ""); console.log(JSON.parse(c).name)')
          DB_NAME="${PROJECT_NAME}-db-pr-${{ github.event.number }}"
          echo "Deleting D1 database: ${DB_NAME}"
          bunx wrangler d1 delete "${DB_NAME}" -y || echo "DB absent — nothing to clean"
